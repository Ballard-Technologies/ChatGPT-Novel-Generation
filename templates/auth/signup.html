{% extends "base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
<h1 class="h4 mb-3">Create an account</h1>
<form method="post" action="{{ url_for('auth.signup') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="field">
        <label class="inputLabel" for="username">Username</label>
        <input type="text" id="username" name="username" value="{{ username or '' }}" required
               minlength="3" maxlength="32" pattern="[A-Za-z][A-Za-z0-9_\-]*" autocomplete="username">
    </div>
    <div class="field">
        <label class="inputLabel" for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
    </div>
    <div class="field">
        <label class="inputLabel" for="confirm_password">Confirm password</label>
        <input type="password" id="confirm_password" name="confirm_password" required minlength="8" autocomplete="new-password">
    </div>
    <button type="submit" class="submit-button">Sign up</button>
</form>
<p class="mt-3">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
{% endblock %}
