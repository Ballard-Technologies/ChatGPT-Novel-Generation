{% extends "base.html" %}
{% block title %}Reset password{% endblock %}
{% block content %}
<h1 class="h4 mb-3">Reset password</h1>
{% if token %}
<form method="post" action="{{ url_for('auth.reset_password', token=token) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="field">
        <label class="inputLabel" for="password">New password</label>
        <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
    </div>
    <div class="field">
        <label class="inputLabel" for="confirm_password">Confirm new password</label>
        <input type="password" id="confirm_password" name="confirm_password" required minlength="8" autocomplete="new-password">
    </div>
    <button type="submit" class="submit-button">Reset password</button>
</form>
{% else %}
<p><a href="{{ url_for('auth.forgot_password') }}">Request a new reset link</a></p>
{% endif %}
{% endblock %}
